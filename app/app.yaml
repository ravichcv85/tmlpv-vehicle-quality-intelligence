command:
  - uvicorn
  - main:app
  - --host=0.0.0.0
  - --port=8000

resources:
  - name: sql-warehouse
    sql_warehouse:
      id: "${DATABRICKS_WAREHOUSE_ID}"
      permission: CAN_USE
  - name: serving-endpoint
    serving_endpoint:
      name: "${FMAPI_ENDPOINT}"
      permission: CAN_QUERY
  - name: database
    database:
      instance_name: "${LAKEBASE_INSTANCE_NAME}"
      database_name: "${LAKEBASE_DB_NAME}"
      permission: CAN_CONNECT_AND_CREATE

env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: "${DATABRICKS_WAREHOUSE_ID}"
  - name: UC_CATALOG
    value: "${UC_CATALOG}"
  - name: UC_SCHEMA
    value: "${UC_SCHEMA}"
  - name: FMAPI_ENDPOINT
    value: "${FMAPI_ENDPOINT}"
